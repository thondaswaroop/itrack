<ion-content class="bg_color">
  <app-header title="Track Shipment"></app-header>
  <ion-grid>
    <ion-row>
      <ion-col size="12" class="text-center">
        <img src="assets/img/track.png" style="height: 100px;">
      </ion-col>
    </ion-row>
  </ion-grid>
  <ion-grid>
    <ion-row>
      <ion-col size="12" class="text-center">
        <ion-text class="heading">Track your Shipment</ion-text>
        <p class="normaltext">Please enter Tracking Number</p>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <ion-searchbar  class="search_bar" placeholder="Enter Tracking Number" [(ngModel)]="searchText"  (keyup.enter)="searchFun(searchText)"></ion-searchbar>
      </ion-col>
      <ion-col size="12">
        <ion-button expand="block" class="search_bar"  (click)="searchFun(searchText);">TRACK</ion-button>
      </ion-col>
    </ion-row>
  </ion-grid>
