<ion-content class="body_bg">
<ion-grid>
  <ion-row>
    <ion-col size="12" class="text-center">
      <img src="assets/img/logo.png" class="main_image">
    </ion-col>
  </ion-row>
</ion-grid>
<ion-grid class="bottom_area pullUp">
  <ion-row>
    <ion-col size="12">
      <h1>i-TRACK</h1>
      <small>i-track is a tool that allows you to ship your items to one of our Hubs and have these forwarded to any of our serviced locations globally.  i-track conveniently allows you to track your shipments from your mobile devices.</small>
    </ion-col>
    <ion-col size="12">
      <ion-button expand="block" fill="outline" (click)="navigation('login');">LOGIN HERE</ion-button>
    </ion-col>
    <ion-col size="12">
      <ion-button expand="block" fill="outline" (click)="navigation('signup');">CREATE A NEW ACCOUNT</ion-button>
    </ion-col>
    <ion-col size="12"><br/><br/></ion-col>
  </ion-row>
</ion-grid>
</ion-content>
