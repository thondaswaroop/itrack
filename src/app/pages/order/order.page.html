<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Track Shipment</ion-title>
  </ion-toolbar>

</ion-header>

<ion-content class="padding">
<ion-grid>
  <ion-row>
    <ion-col size="12" class="text-center">
      <img src="assets/img/bike.png" style="padding: 30px;">
    </ion-col>
  </ion-row>
</ion-grid>
<ion-grid style="padding:30px;">
  <ion-row>
    <ion-col size="11">
      <span>Shipment Status</span>
    </ion-col>
    <!-- <ion-col size="3" style="text-align: right;">
      <span>Details</span>
    </ion-col> -->
    <ion-col size="1" style="text-align: left;">
      <ion-icon name="chevron-forward-outline" ></ion-icon>
    </ion-col>
  </ion-row>
  <ion-row>
    <ion-col size="12" class="timeline">
      <div class="outer">
        <div class="cardbox cardpick" *ngFor="let track of tracking">
          <div class="info">
            <b class="title">{{track.title}}</b>
            <span style="font-family: Gotham-book;">{{track.location}}<br/><small>{{track.date}}</small></span>
          </div>
        </div>
      </div>
    </ion-col>
  </ion-row>
</ion-grid>
</ion-content>
