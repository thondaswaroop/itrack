<ion-app>
  <ion-split-pane contentId="main-content">
    <ion-menu  side="start" menuId="first" contentId="main-content" type="overlay">
      <ion-content>
        <ion-list id="inbox-list" style="text-align: center;">
          <img src="assets/img/fulllogo.png" style="height: 50px;margin-top: -15px;">
        </ion-list>

        <ion-list id="labels-list">
          <ion-item lines="none" (click)="menuNav('home');">
            <ion-icon slot="start" ios="home-outline" md="home-sharp"></ion-icon>
            <ion-label>Home</ion-label>
          </ion-item>
          <ion-item lines="none" (click)="menuNav('shipment');">
            <ion-icon slot="start" ios="navigate-outline" md="navigate-outline"></ion-icon>
            <ion-label>Cargo Drop</ion-label>
          </ion-item>
          <ion-item lines="none" (click)="menuNav('orders');">
            <ion-icon slot="start" ios="calendar-outline" md="calendar-outline"></ion-icon>
            <ion-label>My Shipments</ion-label>
          </ion-item>
          <ion-item lines="none" (click)="menuNav('logout');">
            <ion-icon slot="start" ios="power-outline" md="power-outline"></ion-icon>
            <ion-label>Logout</ion-label>
          </ion-item>
        </ion-list>
        <!-- <ion-row>
          <ion-col size="12" class="bottom_text">Design & Developed By </ion-col>
        </ion-row> -->
      </ion-content>

        <ion-row>

           <b>PmgsTechnology</b>
          </ion-col>
        </ion-row>
      </ion-footer> -->
    </ion-menu>
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>
</ion-app>
